apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  syncWaves:
    - wave: 3
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  sources:
    - repoURL: https://github.com/PierreH2/homelab.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/PierreH2/homelab.git
      targetRevision: main
      path: apps/authentik/prerequisite
      syncWave: 0
    - repoURL: https://charts.goauthentik.io
      chart: authentik
      targetRevision: "2025.12.3"
      syncWave: 1
      helm:
        releaseName: authentik
        valueFiles:
          - $values/apps/authentik/values/values.yaml
    - repoURL: https://github.com/PierreH2/homelab.git
      targetRevision: main
      path: apps/authentik/yaml
      syncWave: 2
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

