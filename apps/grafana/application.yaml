apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: grafana
  sources:
    - repoURL: https://github.com/PierreH2/homelab.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/PierreH2/homelab.git
      targetRevision: main
      path: apps/grafana/prerequisite
      syncWave: 0
    - repoURL: https://grafana.github.io/helm-charts
      chart: grafana
      targetRevision: "10.*"
      syncWave: 1
      helm:
        releaseName: grafana
        valueFiles:
          - $values/apps/grafana/values/values.yaml
    - repoURL: https://github.com/PierreH2/homelab.git
      targetRevision: main
      path: apps/grafana/yaml
      syncWave: 2
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

