---
# CronJob pour activer le mode nuit à minuit
apiVersion: batch/v1
kind: CronJob
metadata:
  name: k3s-night-mode-on
  namespace: kube-system
spec:
  schedule: "0 0 * * *"  # Tous les jours à minuit (00:00)
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: k3s-night-mode
          restartPolicy: OnFailure
          hostNetwork: true
          containers:
          - name: night-mode
            image: bitnami/kubectl:latest
            command:
            - /bin/bash
            - -c
            - |
              echo "🌙 Activation mode nuit"
              
              # Scale down workloads non critiques
              kubectl scale deployment -n harbor harbor-core --replicas=0 2>/dev/null || true
              kubectl scale deployment -n harbor harbor-jobservice --replicas=0 2>/dev/null || true
              kubectl scale deployment -n harbor harbor-portal --replicas=0 2>/dev/null || true
              
              # Adapter selon tes namespaces
              # kubectl scale deployment -n dev --all --replicas=0 2>/dev/null || true
              
              echo "✅ Mode nuit activé"
              kubectl get pods -A | grep -c Running
              echo "pods actifs"
---
# CronJob pour désactiver le mode nuit à 6h du matin
apiVersion: batch/v1
kind: CronJob
metadata:
  name: k3s-night-mode-off
  namespace: kube-system
spec:
  schedule: "0 6 * * *"  # Tous les jours à 6h (06:00)
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: k3s-night-mode
          restartPolicy: OnFailure
          hostNetwork: true
          containers:
          - name: day-mode
            image: bitnami/kubectl:latest
            command:
            - /bin/bash
            - -c
            - |
              echo "☀️ Désactivation mode nuit"
              
              # Scale up workloads
              kubectl scale deployment -n harbor harbor-core --replicas=1 2>/dev/null || true
              kubectl scale deployment -n harbor harbor-jobservice --replicas=1 2>/dev/null || true
              kubectl scale deployment -n harbor harbor-portal --replicas=1 2>/dev/null || true
              
              # kubectl scale deployment -n dev --all --replicas=1 2>/dev/null || true
              
              echo "✅ Mode jour restauré"
              kubectl get pods -A | grep -c Running
              echo "pods actifs"
---
# ServiceAccount avec droits pour scale
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k3s-night-mode
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k3s-night-mode-scaler
rules:
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale"]
  verbs: ["get", "list", "patch", "update"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k3s-night-mode-scaler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k3s-night-mode-scaler
subjects:
- kind: ServiceAccount
  name: k3s-night-mode
  namespace: kube-system
