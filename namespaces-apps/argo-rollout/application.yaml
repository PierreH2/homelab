apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-rollouts
  namespace: argocd
spec:
  project: default

  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      targetRevision: 2.40.5
      chart: argo-rollouts
      helm:
        releaseName: argo-rollouts
        valueFiles:
          - $values/namespaces-apps/argo-rollout/values-rollouts.yaml

    - repoURL: https://github.com/PierreH2/homelab.git
      targetRevision: main
      path: namespaces-apps/argo-rollout
      kustomize:
        enableHelm: true
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: argo-rollouts

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
