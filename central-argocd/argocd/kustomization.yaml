apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - prerequisite/namespace.yaml

helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: "7.*"
    releaseName: argo-cd
    namespace: argocd
    valuesFile: values/values.yaml

commonLabels:
  app.kubernetes.io/name: argocd
  app.kubernetes.io/part-of: homelab

