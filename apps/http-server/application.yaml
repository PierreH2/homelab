apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: http-server
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: http-server
  sources:
    - repoURL: https://github.com/PierreH2/homelab.git
      targetRevision: main
      path: apps/http-server/prerequisite
      syncWave: 0
    - repoURL: https://github.com/PierreH2/homelab.git
      targetRevision: main
      path: apps/http-server/yaml
      syncWave: 1
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
